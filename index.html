<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- SVG favicon first so modern browsers pick the crisp vector version.
         The ?v= query is bumped whenever the asset changes so the cached
         old favicon is invalidated. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Premium B2B-каталог стоматологического оборудования, запасных частей и расходных материалов."
    />
    <title>MED-IX | Стоматологическое оборудование</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700&family=Wix+Madefor+Text:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Hero background is a CSS background-image — preload prevents a render-blocking gap -->
    <link rel="preload" as="image" href="/images/hero/dental-hero-bg.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
