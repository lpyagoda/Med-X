# Med-X — admin SPA + Supabase API proxy
# Listens on a free port (3040 for now; will move to 3030 after pm2 swap during Etap I).
# Proxies /__sb__/* to local Supabase (running on 127.0.0.1:54321 via supabase CLI).
#
# Symlink to /etc/nginx/sites-enabled/ then `nginx -t && systemctl reload nginx`.

server {
    listen 3040;
    server_name _;

    # Where the SPA bundle lives once we `npm run build && scp dist/ to server`.
    root /var/www/med-x/dist;
    index index.html;

    # ----- Supabase API proxy -----
    location /__sb__/ {
        proxy_pass http://127.0.0.1:54321/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # supabase-js attaches its own Authorization & apikey headers; pass through
        proxy_pass_request_headers on;

        # Realtime/WebSocket long-poll friendliness
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ----- SPA fallback -----
    location / {
        try_files $uri /index.html;
    }

    # Vite-built assets get long-cache headers
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
